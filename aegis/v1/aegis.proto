syntax = "proto3";

package aegis.v1;

option go_package = "github.com/yourusername/aegis-proto/aegis/v1;aegisv1";

import "google/protobuf/timestamp.proto";

// ═══════════════════════════════════════════════════════════════════════════
// Aegis Agent → Control Plane Protocol
//
// The agent initiates one bidirectional stream per node.
// All messages from the agent are wrapped in AgentMessage.
// All messages from the control plane are wrapped in ControlPlaneMessage.
//
// Stream lifecycle:
//   1. Agent dials control plane (mTLS)
//   2. Agent sends AgentMessage{connect}
//   3. Control plane validates cluster_id, registers node
//   4. Agent sends AgentMessage{snapshot} — full current state
//   5. Agent sends AgentMessage{event} as things happen
//   6. Agent sends AgentMessage{heartbeat} every 10 seconds
//   7. On disconnect: control plane marks node offline after heartbeat timeout
// ═══════════════════════════════════════════════════════════════════════════


// ── Top-level message wrappers ────────────────────────────────────────────

// Every message from agent to control plane is wrapped here.
// The oneof ensures exactly one payload per message.
message AgentMessage {
  // Identifies which node sent this message.
  // Repeated on every message so the control plane never loses context
  // even if messages arrive out of order on reconnect.
  string cluster_id  = 1;
  string node_name   = 2;

  oneof payload {
    Connect          connect   = 3;
    Heartbeat        heartbeat = 4;
    StateSnapshot    snapshot  = 5;
    ServiceMapEvent  svc_event = 6;
    ThrottleEvent    thr_event = 7;
    ServiceMapBatch  svc_batch = 8;
    EndpointAdvertisement  endpoints  = 9;   // A0 primary feed
    DnsObservation         dns_obs    = 10;  // A0 secondary feed
  }
}

// Every message from control plane to agent is wrapped here.
// Reserved for future use — config updates, acknowledged events, etc.
message ControlPlaneMessage {
  oneof payload {
    ConnectAck   connect_ack = 1;
    ConfigUpdate config      = 2;
  }
}


// ── Connection lifecycle ──────────────────────────────────────────────────

// First message sent by the agent after the stream is established.
// Control plane uses this to register the node and validate cluster_id.
message Connect {
  string agent_version  = 1;  // semver e.g. "1.0.2"
  string runtime_version = 2;  // rustc version e.g. "rustc 1.94.1"
  string os_kernel      = 3;  // e.g. "5.15.0-174-generic"
  int32  cpu_count      = 4;  // number of CPUs on this node
  google.protobuf.Timestamp started_at = 5;  // when this agent instance started

  // This cluster's CIDRs, so the CP can tell "peer in another of the
  // customer's clusters" from "external". Reported once at connect.
  string pod_cidr = 6;  // e.g. "10.42.0.0/16"
  string svc_cidr = 7;  // e.g. "10.43.0.0/16"
  int64  mem_total_bytes = 8;  // total node memory
  string arch            = 9;  // e.g. "aarch64"
}

// Control plane response to Connect.
// Agent should not send events until it receives this acknowledgement.

enum RejectReason {
  REJECT_REASON_UNSPECIFIED = 0;
  CLUSTER_ID_UNKNOWN        = 1;
  CLUSTER_DECOMMISSIONED    = 2;
  CLUSTER_LIMIT_REACHED     = 3;
  LICENSE_EXPIRED           = 4;
  CERTIFICATE_REVOKED       = 5;
}

message ConnectAck {
  bool   accepted       = 1;  // false means cluster_id rejected
  string message        = 2;  // human-readable reason if rejected
  string server_version = 3;  // control plane version
  RejectReason reject_reason = 4;  // structured reason when accepted=false
}

// Sent every AEGIS_CP_HEARTBEAT_INTERVAL_SECS (default 10).
// Control plane marks node offline if no heartbeat received within
// AEGIS_CP_HEARTBEAT_TIMEOUT_SECS (default 30).
message Heartbeat {
  google.protobuf.Timestamp timestamp    = 1;
  int32                     process_count = 2;  // current tracked process count
  uint64                    uptime_secs  = 3;   // agent uptime in seconds
  int32                     buffer_used = 4;
  int32                     buffer_cap  = 5;
}


// ── State snapshot ────────────────────────────────────────────────────────

// Full current state pushed on connect and reconnect.
// Allows the control plane to rebuild its view without loss.
// The control plane replaces all state for this node on receipt.
message StateSnapshot {
  google.protobuf.Timestamp  captured_at   = 1;
  repeated ServiceEdge       service_map   = 2;
  repeated PodThrottleState  throttle      = 3;
  int32                      process_count = 4;
  repeated string namespaces = 5;  // distinct namespaces observed this cycle
}


// ── Service map ───────────────────────────────────────────────────────────

// A directed edge in the service dependency graph.
// Represents observed traffic from one Kubernetes entity to another.
message ServiceEdge {
  // Source endpoint
  string src_name        = 1;  // graph name (service name or pod name)
  string src_namespace   = 2;
  string src_owner_kind  = 3;  // Deployment, StatefulSet, DaemonSet
  string src_owner_name  = 4;
  string src_service_name = 5; // Kubernetes service name if resolved, empty otherwise

  // Destination endpoint
  string dst_name        = 6;
  string dst_namespace   = 7;
  string dst_owner_kind  = 8;
  string dst_owner_name  = 9;
  string dst_service_name = 10;

  // Traffic characteristics
  uint32 dst_port        = 11;
  uint32 proto           = 12; // 6=TCP, 17=UDP
  uint64 bytes_total     = 13;
  uint64 packets_total   = 14;

  // Timestamps
  google.protobuf.Timestamp first_seen_at = 15;
  google.protobuf.Timestamp last_seen_at  = 16;

  // Raw peer addressing — set when the destination did not resolve to a
  // local workload (cross-node, cross-cluster, or external peer). The CP
  // uses dst_ip to correlate against other nodes'/clusters' pod indexes,
  // or classify as external by port/proto.
  string src_ip     = 17;  // dotted IPv4, may be empty when resolved locally
  string dst_ip     = 18;  // dotted IPv4 of the unresolved peer
  string flow_class = 19;  // agent label: EAST_WEST, SERVICE, EXT_EGRESS, EXT_INGRESS, HOST_TRAFFIC
}

// Incremental service map event — sent as changes happen.
message ServiceMapEvent {
  enum EventType {
    EVENT_TYPE_UNSPECIFIED = 0;
    EDGE_DISCOVERED        = 1;  // new edge seen for the first time
    EDGE_UPDATED           = 2;  // existing edge has new traffic
    EDGE_EVICTED           = 3;  // edge stale, removed from graph
  }

  EventType                 type      = 1;
  ServiceEdge               edge      = 2;
  google.protobuf.Timestamp occurred_at = 3;
}

// Batched incremental service-map changes. The agent coalesces one poll
// interval's edge updates/evictions into a single frame, bounding the message
// rate at scale to one frame per node per interval rather than one per edge.
message ServiceMapBatch {
  repeated ServiceMapEvent events = 1;
}


// ── CPU throttle ──────────────────────────────────────────────────────────

// Throttle trend classification — mirrors the agent's internal enum.
enum ThrottleTrend {
  THROTTLE_TREND_UNSPECIFIED = 0;
  STABLE                     = 1;
  WARNING                    = 2;
  CRITICAL                   = 3;
}

// Current throttle state for one pod.
message PodThrottleState {
  // Kubernetes identity
  string pod_name      = 1;
  string namespace     = 2;
  string owner_kind    = 3;
  string owner_name    = 4;
  string service_name  = 5;  // empty if not behind a service

  // Current state
  ThrottleTrend trend          = 6;
  double        throttle_ratio = 7;  // 0.0–1.0, current window ratio

  // Last N window ratios for sparkline display in the iOS app.
  // Most recent last. Maximum 6 values (matches AEGIS_THROTTLE_WINDOW_COUNT).
  repeated double window_ratios = 8;

  google.protobuf.Timestamp last_updated_at = 9;

  // Pod IP, so the CP can build a per-cluster IP -> workload index and
  // resolve peer IPs reported in half-edges (cross-node / cross-cluster).
  string pod_ip = 10;

  string node_name = 11;   // node where the pod is running
}

// Incremental throttle event — sent when trend changes.
// Not sent on every poll — only when something meaningful changes.
message ThrottleEvent {
  enum EventType {
    EVENT_TYPE_UNSPECIFIED = 0;
    TREND_CHANGED          = 1;  // Stable→Warning, Warning→Critical, Critical→Stable etc.
    TREND_RESOLVED         = 2;
    SNAPSHOT               = 3;  // periodic full throttle state for all pods on this node
    POD_GONE               = 4;  // pod's last process exited; evict state
    TREND_UPDATE           = 5;  // periodic state report, no trend change
  }

  EventType                 type        = 1;
  PodThrottleState          state       = 2;
  ThrottleTrend             previous_trend = 3;  // what the trend was before this change
  google.protobuf.Timestamp occurred_at = 4;
}


// ── Config update (control plane → agent) ────────────────────────────────

// Reserved for future use — allows the control plane to push
// configuration updates to agents without requiring a restart.
// Not implemented in v1 agent but defined here for forward compatibility.
message ConfigUpdate {
  // Polling intervals (seconds). 0 means keep current value.
  uint32 throttle_poll_secs      = 1;
  uint32 flow_poll_secs          = 2;
  uint32 heartbeat_interval_secs = 3;

  // Throttle thresholds. 0.0 means keep current value.
  double throttle_warning_ratio  = 4;
  double throttle_critical_ratio = 5;

  bool decommissioned = 6;
}


// ── RPC service definition ────────────────────────────────────────────────

service AegisAgent {
  // The primary stream. Agent opens this on startup and keeps it open.
  // Agent sends AgentMessage, control plane sends ControlPlaneMessage.
  // mTLS provides authentication at the transport layer.
  // cluster_id in AgentMessage provides application-layer validation.
  rpc OpenStream(stream AgentMessage) returns (stream ControlPlaneMessage);
}

// ── Resolution feeds (A0: cross-cluster correlation bedrock) ───────────────
// The CP joins cross-cluster half-edges by destination identity. Because a
// cross-cluster source dials a Service VIP / LB / ingress IP — not the dst
// pod IP — the raw-IP join used for cross-node doesn't carry across clusters.
// These two feeds let the CP build a fleet-wide IP->identity and name->identity
// index ahead of time, so an arriving half-edge resolves by lookup.

// PRIMARY feed. The cluster's externally-reachable endpoints mapped to the
// workload behind them. Low churn (Services/Ingress turn over far less than
// pods), so sent on-change / low-frequency — NOT in the flow batch.
message EndpointAdvertisement {
  google.protobuf.Timestamp captured_at = 1;

  // Full set of this cluster's externally-reachable endpoints this cycle.
  // The CP treats each advertisement as the authoritative set for the
  // sending cluster and reconciles (adds new, evicts missing).
  repeated ServiceEndpoint endpoints = 2;
}

// One externally-reachable endpoint -> backing workload identity.
message ServiceEndpoint {
  // Reachable address a cross-cluster source would dial.
  string address = 1;   // dotted IPv4: LB ingress IP, ingress host IP, or node IP (NodePort)
  uint32 port    = 2;   // service / nodePort
  uint32 proto   = 3;   // 6=TCP, 17=UDP

  EndpointKind kind = 4;

  // Backing workload identity (what the resolved edge dst should become).
  string service_name = 5;
  string namespace    = 6;
  string owner_kind   = 7;  // Deployment, StatefulSet, DaemonSet
  string owner_name   = 8;

  // DNS name(s) this endpoint is exposed under, when known (ingress host,
  // service FQDN). Feeds the name index; lets a DnsObservation join here.
  repeated string dns_names = 9;
}

enum EndpointKind {
  ENDPOINT_KIND_UNSPECIFIED = 0;
  LOAD_BALANCER             = 1;  // Service type=LoadBalancer ingress IP
  INGRESS                   = 2;  // Ingress host/IP
  reserved 3;                     // reserved for NODE_PORT
}

// SECONDARY feed. A DNS resolution observed from a source pod — the name it
// dialed and the IP it got back. Fills what advertisement can't (name-only /
// external targets) and confirms intent. Best-effort: absent under DoT/DoH,
// IP-literal dials, and pre-watch cached connections.
message DnsObservation {
  string src_namespace = 1;  // querying pod's namespace
  string src_pod       = 2;  // querying pod
  string query_name    = 3;  // name resolved, e.g. "inventory.demo.svc.cluster.local" or an ingress host
  string resolved_ip   = 4;  // dotted IPv4 the name resolved to
  google.protobuf.Timestamp observed_at = 5;
}
